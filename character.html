<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0d0d0d;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Geist Mono', monospace;
  }

  .canvas-wrap {
    width: 340px;
    height: 340px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background: #141414;
    border: 1px solid #2a2a2a;
  }

  .canvas-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .speak-btn {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffffff;
    color: #0d0d0d;
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, background 0.15s;
  }

  .speak-btn.playing {
    opacity: 0.6;
    cursor: default;
  }

  .mute-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: #555;
    transition: color 0.15s;
    line-height: 0;
  }

  .mute-btn:hover { color: #888; }
  .mute-btn.muted { color: #888; }

  .mute-btn .icon-sound,
  .mute-btn .icon-muted { display: block; }
  .mute-btn .icon-muted { display: none; }
  .mute-btn.muted .icon-sound { display: none; }
  .mute-btn.muted .icon-muted { display: block; }
</style>
</head>
<body>

<div class="canvas-wrap">
  <canvas id="rive-canvas"></canvas>
  <button class="speak-btn" id="speak-btn" onclick="toggleSpeech()">SPEAK</button>
</div>

// ── VISEME SETUP ─────────────────────────────────────────────────────────────
const VISEME_INPUT = {
  0: 'viseme_sil',
  1: 'viseme_aei',
  2: 'viseme_bmp',
  3: 'viseme_fv',
  4: 'viseme_cdgncstxyz',
  5: 'viseme_ou',
  6: 'viseme_chshj',
  7: 'viseme_lth',
  8: 'viseme_o',
  9: 'viseme_qw',
};
const ALL_VISEME_INPUTS = Object.values(VISEME_INPUT);

// ── RIVE INIT ─────────────────────────────────────────────────────────────────
let riveInstance = null;
let inputs = {};

function b64ToBytes(b64) {
  const bin = atob(b64), arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function initRive() {
  const bytes = b64ToBytes(RIV_B64);
  riveInstance = new rive.Rive({
    buffer: bytes.buffer,
    canvas: document.getElementById('rive-canvas'),
    stateMachines: ['State Machine 1'],
    autoplay: true,
    onLoad: () => {
      riveInstance.resizeDrawingSurfaceToCanvas();
      const allInputs = riveInstance.stateMachineInputs('State Machine 1');
      allInputs.forEach(inp => { inputs[inp.name] = inp; });
      setSilence();
    },
    onLoadError: () => { console.warn('Rive load error'); }
  });
}

// ── VISEME CONTROL ────────────────────────────────────────────────────────────
function setAllVisemesOff() {
  ALL_VISEME_INPUTS.forEach(name => { if (inputs[name]) inputs[name].value = 0; });
}

function setSilence() {
  setAllVisemesOff();
  if (inputs['viseme_sil']) inputs['viseme_sil'].value = 100;
}

function setViseme(visemeIndex, weight = 1.0) {
  const name = VISEME_INPUT[visemeIndex];
  if (!name) return;
  setAllVisemesOff();
  const val = Math.round(weight * 100);
  if (visemeIndex === 0) {
    if (inputs['viseme_sil']) inputs['viseme_sil'].value = val;
  } else {
    if (inputs[name]) inputs[name].value = val;
  }
}

// ── AUDIO + TIMELINE ──────────────────────────────────────────────────────────
const audio = new Audio('phrase1.mp3');
let timeline = null;
let timeouts = [];
let playing = false;
let muted = false;

fetch('phrase1.json')
  .then(r => r.json())
  .then(data => { timeline = data; })
  .catch(err => console.warn('Timeline load error:', err));

function stopSpeech() {
  audio.pause();
  audio.currentTime = 0;
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
  setSilence();
  playing = false;
  const btn = document.getElementById('speak-btn');
  btn.textContent = 'SPEAK';
  btn.classList.remove('playing');
}

function toggleSpeech() {
  if (playing) {
    stopSpeech();
    return;
  }

  playing = true;
  const btn = document.getElementById('speak-btn');
  btn.textContent = 'SPEAKING…';
  btn.classList.add('playing');

  // Schedule viseme events
  if (timeline && timeline.length > 0) {
    timeline.forEach(({ viseme, timeMs, weight = 1.0 }) => {
      timeouts.push(setTimeout(() => setViseme(viseme, weight), timeMs));
    });
    const lastMs = timeline[timeline.length - 1].timeMs;
    timeouts.push(setTimeout(() => setSilence(), lastMs + 200));
  }

  audio.currentTime = 0;
  audio.muted = muted;
  audio.play().catch(e => console.warn('Audio play error:', e));

  audio.addEventListener('ended', onEnded);
}

function onEnded() {
  audio.removeEventListener('ended', onEnded);
  playing = false;
  setSilence();
  const btn = document.getElementById('speak-btn');
  btn.textContent = 'SPEAK';
  btn.classList.remove('playing');
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
}

// ── MUTE TOGGLE ───────────────────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  audio.muted = muted;
  const btn = document.getElementById('mute-btn');
  btn.classList.toggle('muted', muted);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
initRive();
