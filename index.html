<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rive.expert — Interactive Character</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Geist Pixel';
    src: url('https://raw.githubusercontent.com/vercel/geist-font/main/packages/next/dist/fonts/geist-pixel/GeistPixel-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --bg2: #141414;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --border-active: #3a3a3a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #6c47ff;
    --accent2: #8a6aff;
    --teal: #00d1b2;
    --font: 'Geist Mono', monospace;
    --pixel: 'Geist Pixel', monospace;
    --radius: 8px;
    --radius-lg: 14px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    gap: 0;
  }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 380px 340px;
    gap: 32px;
    align-items: start;
    width: 100%;
    max-width: 760px;
  }

  /* ── LEFT: QUESTIONS ── */
  .questions-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-top: 8px;
  }

  .panel-label {
    font-size: 10px;
    line-height: 1;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .q-btn {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }

  .q-btn:hover {
    border-color: var(--border-active);
    background: var(--bg3);
  }

  .q-btn.active {
    background: var(--bg3);
  }

  .q-number {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .q-btn.active .q-number { color: var(--accent); }

  .q-text {
    font-size: 15px;
    line-height: 22px;
    color: var(--text);
    font-weight: 600;
  }

/* playing indicator */
  .q-playing {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .q-btn.playing .q-playing { display: flex; }
  .play-dot {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 14px;
  }
  .play-dot span {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: bar 0.8s ease-in-out infinite;
  }
  .play-dot span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .play-dot span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .play-dot span:nth-child(3) { height: 14px; animation-delay: 0.3s; }
  .play-dot span:nth-child(4) { height: 8px; animation-delay: 0.45s; }
  @keyframes bar {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  .playing-label {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── CONTACT BUTTON (phrase 3) ── */
  .contact-btn {
    display: none;
    /* shown by JS */
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 16px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    width: fit-content;
    transition: background 0.15s, transform 0.1s;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s, transform 0.4s, background 0.15s;
  }
  .contact-btn.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .contact-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .contact-btn svg { width: 13px; height: 13px; }

  /* ── RIGHT: CHARACTER ── */
  .character-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: sticky;
    top: 40px;
    padding-top: 34px;
  }

  .col-label {
    font-family: var(--pixel);
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    align-self: flex-start;
    margin-bottom: 16px;
    line-height: 1;
  }
  .col-label span { color: var(--accent); }

  .canvas-wrap {
    width: 340px;
    height: 340px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: relative;
    background: var(--bg2);
    border: 1px solid var(--border);
  }
  .canvas-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .char-status {
    font-size: 10px;
    color: var(--text3);
    margin-top: 8px;
    letter-spacing: 0.04em;
    min-height: 16px;
  }
  .char-status.ok { color: var(--teal); }
  .char-status.err { color: #ff4d00; }

  /* subtitle / transcript */
  .subtitle {
    width: 100%;
    height: 130px;
    margin-top: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 11px;
    line-height: 18px;
    color: var(--text2);
    font-style: italic;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .subtitle.visible { opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    body { padding: 24px 16px; justify-content: flex-start; }
    .layout {
      grid-template-columns: 1fr;
      max-width: 100%;
      gap: 24px;
    }
    .character-col { position: static; order: -1; padding-top: 0; }
    .canvas-wrap { width: 100%; height: 300px; }
.contact-btn { width: 100%; justify-content: center; }
  }

  @media (max-width: 480px) {
    body { padding: 16px 12px; }
    .canvas-wrap { height: 260px; }
    .q-btn { padding: 14px 16px; }
    .q-text { font-size: 14px; }
  }
</style>
</head>

// Pre-fetch all timelines independently (one failure doesn't block others)
PHRASES.forEach((p, i) => {
  fetch('phrase' + (i + 1) + '.json')
    .then(r => r.json())
    .then(data => { p.timeline = data; })
    .catch(err => console.warn('Timeline load error for phrase', i + 1, ':', err));
});

// Viseme index → Rive input name (matches this specific .riv file)
const VISEME_INPUT = {
  0: 'viseme_sil',
  1: 'viseme_aei',
  2: 'viseme_bmp',
  3: 'viseme_fv',
  4: 'viseme_cdgncstxyz',
  5: 'viseme_ou',
  6: 'viseme_chshj',
  7: 'viseme_lth',
  8: 'viseme_o',
  9: 'viseme_qw',
};

const ALL_VISEME_INPUTS = Object.values(VISEME_INPUT);

// ── RIVE INIT ────────────────────────────────────────────────────────────────
let riveInstance = null;
let inputs = {};

function b64ToBytes(b64) {
  const bin = atob(b64), arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function initRive() {
  const bytes = b64ToBytes(RIV_B64);
  riveInstance = new rive.Rive({
    buffer: bytes.buffer,
    canvas: document.getElementById('rive-canvas'),
    stateMachines: ['State Machine 1'],
    autoplay: true,
    onLoad: () => {
      riveInstance.resizeDrawingSurfaceToCanvas();
      const allInputs = riveInstance.stateMachineInputs('State Machine 1');
      allInputs.forEach(inp => { inputs[inp.name] = inp; });
      // Default: silence active
      setSilence();
      const status = document.getElementById('char-status');
      status.textContent = 'Ready';
      status.className = 'char-status ok';
      setTimeout(() => { status.textContent = ''; }, 2000);
    },
    onLoadError: () => {
      const status = document.getElementById('char-status');
      status.textContent = 'Load error';
      status.className = 'char-status err';
    }
  });
}

// ── VISEME CONTROL ───────────────────────────────────────────────────────────
function setAllVisemesOff() {
  ALL_VISEME_INPUTS.forEach(name => {
    if (inputs[name]) inputs[name].value = 0;
  });
}

function setSilence() {
  setAllVisemesOff();
  if (inputs['viseme_sil']) inputs['viseme_sil'].value = 100;
}

function setViseme(visemeIndex, weight = 1.0) {
  const name = VISEME_INPUT[visemeIndex];
  if (!name) return;
  setAllVisemesOff();
  const val = Math.round(weight * 100);
  if (visemeIndex === 0) {
    if (inputs['viseme_sil']) inputs['viseme_sil'].value = val;
  } else {
    if (inputs[name]) inputs[name].value = val;
  }
}

// ── PLAYBACK ─────────────────────────────────────────────────────────────────
let currentAudio = null;
let timeouts = [];
let currentPhraseIdx = -1;

function stopCurrent() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
  setSilence();
  // Reset all button states
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active', 'playing'));
  // Hide subtitle
  document.querySelectorAll('.subtitle').forEach(s => { s.textContent = ''; s.classList.remove('visible'); });
  currentPhraseIdx = -1;
}

function playPhrase(idx) {
  // Toggle: if same phrase is playing, stop it
  if (currentPhraseIdx === idx) {
    stopCurrent();
    return;
  }
  stopCurrent();

  const phrase = PHRASES[idx];
  currentPhraseIdx = idx;

  // Activate button
  const btn = document.getElementById('q' + (idx + 1));
  btn.classList.add('active', 'playing');

  // Show subtitle
  document.querySelectorAll('.subtitle').forEach(s => { s.textContent = '\u201c' + phrase.text + '\u201d'; s.classList.add('visible'); });

  // Schedule viseme events (only if timeline loaded)
  if (phrase.timeline && phrase.timeline.length > 0) {
    phrase.timeline.forEach(({ viseme, timeMs, weight = 1.0 }) => {
      timeouts.push(setTimeout(() => setViseme(viseme, weight), timeMs));
    });
    const lastMs = phrase.timeline[phrase.timeline.length - 1].timeMs;
    timeouts.push(setTimeout(() => setSilence(), lastMs + 200));
  }

  // Play audio
  const audio = phrase.audio;
  audio.currentTime = 0;
  currentAudio = audio;
  audio.play().catch(e => console.warn('Audio play error:', e));

  audio.addEventListener('ended', () => {
    setSilence();
    btn.classList.remove('active', 'playing');
    currentPhraseIdx = -1;
    // Hide subtitle
    document.querySelectorAll('.subtitle').forEach(s => s.classList.remove('visible'));
    setTimeout(() => { document.querySelectorAll('.subtitle').forEach(s => { s.textContent = ''; }); }, 300);
    // Show contact button for phrase 3
    if (idx === 2) {
      const cb = document.getElementById('contact-btn');
      cb.style.display = 'flex';
      requestAnimationFrame(() => cb.classList.add('visible'));
    }
  });
}

// ── CONTACT BUTTON (phrase 3 reveal timing) ──────────────────────────────────
// Also show contact btn partway through phrase 3 playback
// (it'll appear when audio ends, see above)

// ── BOOT ─────────────────────────────────────────────────────────────────────
initRive();
</script>
